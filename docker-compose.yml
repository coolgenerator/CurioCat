services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: curiocat
      POSTGRES_PASSWORD: curiocat
      POSTGRES_DB: curiocat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U curiocat -d curiocat"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./curiocat:/app/curiocat

volumes:
  pgdata:
